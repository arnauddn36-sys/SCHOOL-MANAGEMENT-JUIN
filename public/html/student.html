<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Élève</title>


    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/student.css">

</head>


<body>


<header class="student-header">


    <h1>
        Dashboard Élève
    </h1>


    <button>
        Déconnexion
    </button>


</header>




<main>



    <!-- Informations élève -->


    <section class="student-info">


        <h2>
            Mes informations
        </h2>


        <p>
            Nom : ---
        </p>


        <p>
            Prénom : ---
        </p>


        <p>
            Classe : ---
        </p>


        <p>
            Matricule : ---
        </p>


    </section>





    <!-- Actions élève -->


    <section class="student-menu">


        <h2>
            Mon espace
        </h2>



        <button>
            Voir mes notes
        </button>



        <button>
            Voir mes absences
        </button>



        <button>
            Voir mon emploi du temps
        </button>



    </section>





    <!-- Tableau des notes -->


    <section class="grades">


        <h2>
            Mes notes
        </h2>



        <table>


            <thead>


                <tr>

                    <th>
                        Matière
                    </th>


                    <th>
                        Note
                    </th>


                    <th>
                        Coefficient
                    </th>


                </tr>


            </thead>



            <tbody>


                <tr>

                    <td>
                        ---
                    </td>


                    <td>
                        ---
                    </td>


                    <td>
                        ---
                    </td>


                </tr>


            </tbody>



        </table>


    </section>






    <!-- Tableau absences -->


    <section class="absences">


        <h2>
            Mes absences
        </h2>



        <table>


            <thead>


                <tr>

                    <th>
                        Date
                    </th>


                    <th>
                        Motif
                    </th>


                </tr>


            </thead>



            <tbody>


                <tr>

                    <td>
                        ---
                    </td>


                    <td>
                        ---
                    </td>


                </tr>


            </tbody>



        </table>



    </section>




</main>



</body>

</html>
