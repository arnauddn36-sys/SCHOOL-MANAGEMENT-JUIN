<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Professeur</title>


    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/teacher.css">

</head>


<body>


<header class="teacher-header">


    <h1>
        Dashboard Professeur
    </h1>


    <button>
        Déconnexion
    </button>


</header>




<main>


    <!-- Informations professeur -->


    <section class="teacher-info">


        <h2>
            Bienvenue Professeur
        </h2>


        <p>
            Matière : Mathématiques
        </p>


        <p>
            Classe : Terminale A
        </p>


    </section>





    <!-- Actions professeur -->


    <section class="teacher-menu">


        <h2>
            Gestion pédagogique
        </h2>



        <button>
            Voir mes élèves
        </button>



        <button>
            Ajouter une note
        </button>



        <button>
            Modifier une note
        </button>



        <button>
            Gérer les absences
        </button>



        <button>
            Voir mes matières
        </button>



    </section>





    <!-- Tableau élèves -->


    <section class="students-list">


        <h2>
            Liste des élèves
        </h2>



        <table>


            <thead>

                <tr>

                    <th>
                        Matricule
                    </th>


                    <th>
                        Nom
                    </th>


                    <th>
                        Prénom
                    </th>


                    <th>
                        Classe
                    </th>


                </tr>

            </thead>



            <tbody>


                <tr>

                    <td>
                        ---
                    </td>

                    <td>
                        ---
                    </td>


                    <td>
                        ---
                    </td>


                    <td>
                        ---
                    </td>


                </tr>


            </tbody>


        </table>


    </section>



</main>



</body>

</html>
