<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Dashboard Administrateur
    </title>


    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">

</head>


<body>


    <header class="admin-header">

        <h1>
            School Management
        </h1>


        <div class="admin-info">

            <span>
                Administrateur
            </span>

            <button id="logout">
                Déconnexion
            </button>

        </div>


    </header>





    <main class="admin-container">


        <!-- MENU ADMIN -->

        <aside class="admin-menu">


            <h2>
                Menu
            </h2>


            <ul>


                <li>
                    <button>
                        Gestion utilisateurs
                    </button>
                </li>


                <li>
                    <button>
                        Gestion élèves
                    </button>
                </li>


                <li>
                    <button>
                        Gestion professeurs
                    </button>
                </li>


                <li>
                    <button>
                        Gestion matières
                    </button>
                </li>


                <li>
                    <button>
                        Statistiques
                    </button>
                </li>


            </ul>


        </aside>






        <!-- CONTENU PRINCIPAL -->

        <section class="admin-content">


            <h2>
                Bienvenue Administrateur
            </h2>



            <div class="cards">


                <div class="card">

                    <h3>
                        Utilisateurs
                    </h3>

                    <p>
                        Gérer les comptes
                    </p>

                </div>



                <div class="card">

                    <h3>
                        Élèves
                    </h3>

                    <p>
                        Gestion des élèves
                    </p>

                </div>




                <div class="card">

                    <h3>
                        Professeurs
                    </h3>

                    <p>
                        Gestion des professeurs
                    </p>

                </div>



                <div class="card">

                    <h3>
                        Matières
                    </h3>

                    <p>
                        Gestion des matières
                    </p>

                </div>



            </div>


        </section>



    </main>





<script src="../js/admin.js"></script>


</body>


</html>
